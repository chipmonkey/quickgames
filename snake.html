<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
   * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
  canvas { border: 2px solid #333; }
   #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; padding: 12px 24px; display: flex; justify-content: space-between; font-size: 20px; }
   #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 10;
   }
   #overlay.hidden { display: none; }
   #overlay h1 { color: #44ff44; font-size: 48px; margin-bottom: 16px; letter-spacing: 6px; text-transform: uppercase; }
   #overlay p { color: #ccc; font-size: 18px; margin-bottom: 6px; }
   #overlay .sub { color: #888; font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>
<div id="ui">
    <div>SCORE: <span id="score">0</span></div>
    <div>BEST: <span id="best">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
    <h1>SNAKE</h1>
    <p>&larr; &rarr; &uarr; &darr; to move</p>
    <p>Eat food, don't hit yourself or the walls</p>
    <p class="sub">Press SPACE to start</p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');

const CELL_COUNT = 20;
let SZ = 20;
canvas.width = CELL_COUNT * SZ;
canvas.height = CELL_COUNT * SZ;

let snake = [];
let dir = { x: 1, y: 0 };
let nextDir = { x: 1, y: 0 };
let food = null;
let score = 0;
let best = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = best;
let state = 'start';
let tickTimer = 0;
let tickRate = 120;
let lastTime = 0;

function resize() {
  const maxW = Math.min(window.innerWidth - 40, 600);
  const maxH = Math.min(window.innerHeight - 120, 600);
  SZ = Math.floor(Math.min(maxW, maxH) / CELL_COUNT);
  canvas.width = CELL_COUNT * SZ;
  canvas.height = CELL_COUNT * SZ;
}
resize();
window.addEventListener('resize', resize);

window.addEventListener('keydown', function(e) {
  if (state === 'start') {
    if (e.code === 'Space') {
      state = 'playing';
      overlay.classList.add('hidden');
      init();
      return;
     }
   }
  if (state === 'over') {
    if (e.code === 'Space') {
      state = 'playing';
      overlay.classList.add('hidden');
      init();
      return;
     }
   }

  switch(e.code) {
    case 'ArrowUp':
      if (dir.y !== 1) nextDir = { x: 0, y: -1 };
      e.preventDefault();
      break;
    case 'ArrowDown':
      if (dir.y !== -1) nextDir = { x: 0, y: 1 };
      e.preventDefault();
      break;
    case 'ArrowLeft':
      if (dir.x !== 1) nextDir = { x: -1, y: 0 };
      e.preventDefault();
      break;
    case 'ArrowRight':
      if (dir.x !== -1) nextDir = { x: 1, y: 0 };
      e.preventDefault();
      break;
   }
});

function init() {
  const cx = Math.floor(CELL_COUNT / 2);
  const cy = Math.floor(CELL_COUNT / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy }
   ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  tickRate = 120;
  tickTimer = 0;
  spawnFood();
   scoreEl.textContent = score;
 }

function spawnFood() {
  for (let attempts = 0; attempts < 100; attempts++) {
    const x = Math.floor(Math.random() * CELL_COUNT);
    const y = Math.floor(Math.random() * CELL_COUNT);
    let onSnake = false;
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === x && snake[i].y === y) {
        onSnake = true;
        break;
       }
     }
    if (!onSnake) {
      food = { x: x, y: y };
      return;
     }
   }
 }

function update(dt) {
  if (state !== 'playing') return;

  tickTimer += dt;
  if (tickTimer < tickRate) return;
  tickTimer = 0;

  dir = nextDir;

  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
   };

   // Wall collision
  if (head.x < 0 || head.x >= CELL_COUNT || head.y < 0 || head.y >= CELL_COUNT) {
    gameOver();
    return;
   }

   // Self collision
  for (let i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      gameOver();
      return;
     }
   }

  snake.unshift(head);

   // Food
  if (food && head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
     }
    scoreEl.textContent = score;
    tickRate = Math.max(50, 120 - Math.floor(score / 50) * 5);
    spawnFood();
   } else {
    snake.pop();
   }
 }

function gameOver() {
  state = 'over';
  overlay.classList.remove('hidden');
  overlay.innerHTML = '<h1>GAME OVER</h1><p>Score: ' + score + '</p><p>Best: ' + best + '</p><p class="sub">Press SPACE to restart</p>';
 }

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

   // Grid lines
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CELL_COUNT; x++) {
    ctx.beginPath();
    ctx.moveTo(x * SZ, 0);
    ctx.lineTo(x * SZ, canvas.height);
    ctx.stroke();
   }
  for (let y = 0; y <= CELL_COUNT; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * SZ);
    ctx.lineTo(canvas.width, y * SZ);
    ctx.stroke();
   }

   // Food
  if (food) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(food.x * SZ + 2, food.y * SZ + 2, SZ - 4, SZ - 4);
     ctx.fillStyle = '#ff8888';
    ctx.fillRect(food.x * SZ + 4, food.y * SZ + 4, 3, 3);
   }

   // Snake
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    if (i === 0) {
       // Head - brighter
      ctx.fillStyle = '#66ff66';
     } else {
       // Body - gradient darkness
      const t = i / snake.length;
      const g = Math.floor(200 - t * 100);
      ctx.fillStyle = 'rgb(40,' + g + ',40)';
     }
    ctx.fillRect(s.x * SZ + 1, s.y * SZ + 1, SZ - 2, SZ - 2);
    if (i === 0) {
       // Eyes
      ctx.fillStyle = '#000';
      const ex = s.x * SZ + SZ / 2;
      const ey = s.y * SZ + SZ / 2;
      if (dir.x === 1) {
        ctx.fillRect(ex + 2, ey - 4, 3, 3);
        ctx.fillRect(ex + 2, ey + 1, 3, 3);
       } else if (dir.x === -1) {
        ctx.fillRect(ex - 5, ey - 4, 3, 3);
        ctx.fillRect(ex - 5, ey + 1, 3, 3);
       } else if (dir.y === -1) {
        ctx.fillRect(ex - 4, ey - 5, 3, 3);
        ctx.fillRect(ex + 1, ey - 5, 3, 3);
       } else {
        ctx.fillRect(ex - 4, ey + 2, 3, 3);
        ctx.fillRect(ex + 1, ey + 2, 3, 3);
       }
     }
   }
 }

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
