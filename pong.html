<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #score { color: #fff; font-size: 48px; position: absolute; top: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 120px; pointer-events: none; }
    #score span { min-width: 80px; text-align: center; }
    #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        pointer-events: auto;
    }
    #overlay.hidden { display: none; }
    #overlay h1 { color: #fff; font-size: 56px; margin-bottom: 16px; letter-spacing: 8px; text-transform: uppercase; }
    #overlay p { color: #ccc; font-size: 18px; margin-bottom: 6px; }
    #overlay .sub { color: #888; font-size: 14px; margin-top: 20px; }
    #mode-select { margin-top: 20px; display: flex; gap: 20px; }
    #mode-select button {
        padding: 12px 28px; border: 2px solid #fff; background: none; color: #fff;
        font-family: 'Courier New', monospace; font-size: 16px; cursor: pointer;
        letter-spacing: 2px; text-transform: uppercase; transition: background 0.15s;
    }
    #mode-select button:hover { background: #fff; color: #000; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div id="score"><span id="player-score">0</span><span id="ai-score">0</span></div>
    <div id="overlay">
        <h1>Pong</h1>
        <p>First to 7 wins</p>
        <p style="color:#666; margin-top:10px;">W/S or ↑/↓ — Move paddle</p>
        <div id="mode-select">
            <button onclick="startGame('ai')">VS CPU</button>
            <button onclick="startGame('2p')">2 Players</button>
        </div>
        <p class="sub">Press any paddle key to quick-start VS CPU</p>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PADDLE_W = 14, PADDLE_H = 110, BALL_SIZE = 12;
const WIN_SCORE = 7;
const PADDLE_MARGIN = 40;
const START_SPEED = 6;
const AI_SPEED = 5;

let ball, p1, p2, score1, score2, gameMode, running = false, keys = {};

function init() {
    score1 = 0;
    score2 = 0;
    p1 = { x: PADDLE_MARGIN, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
    p2 = { x: W - PADDLE_MARGIN - PADDLE_W, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
    resetBall();
    updateScore();
}

function resetBall(dir) {
    const angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
    const speed = START_SPEED;
    const xdir = dir || (Math.random() < 0.5 ? 1 : -1);
    ball = {
        x: W / 2 - BALL_SIZE / 2,
        y: H / 2 - BALL_SIZE / 2,
        w: BALL_SIZE, h: BALL_SIZE,
        dx: Math.cos(angle) * speed * xdir,
        dy: Math.sin(angle) * speed
    };
}

function updateScore() {
    document.getElementById('player-score').textContent = score1;
    document.getElementById('ai-score').textContent = score2;
}

function startGame(mode) {
    gameMode = mode;
    running = true;
    document.getElementById('overlay').classList.add('hidden');
    init();
}

function showOverlay(title, sub) {
    running = false;
    const ov = document.getElementById('overlay');
    ov.classList.remove('hidden');
    ov.querySelector('h1').textContent = title;
    ov.querySelector('p').nextElementSibling.textContent = sub || 'Press any key or click a mode';
    // Re-show mode select
    const existing = ov.querySelector('#mode-select');
    if (existing) existing.style.display = 'flex';
}

const keys_pressed = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (!running && !keys_pressed['any']) {
        keys_pressed['any'] = true;
        startGame('ai');
    }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function update() {
    if (!running) return;

    // Player 1 controls (W/S)
    p1.dy = 0;
    if (keys['w'] || keys['W']) p1.dy = -8;
    if (keys['s'] || keys['S']) p1.dy = 8;

    // Player 2 controls
    if (gameMode === '2p') {
        p2.dy = 0;
        if (keys['ArrowUp']) p2.dy = -8;
        if (keys['ArrowDown']) p2.dy = 8;
    } else {
        // AI
        if (p2.y + p2.h / 2 < ball.y) p2.dy = AI_SPEED;
        else if (p2.y + p2.h / 2 > ball.y) p2.dy = -AI_SPEED;
    }

    // Move paddles
    p1.y = Math.max(0, p1.y + p1.dy);
    p2.y = Math.max(0, p2.y + p2.dy);

    // Move ball
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Top/bottom bounce
    if (ball.y <= 0) { ball.y = 0; ball.dy = -ball.dy; }
    if (ball.y + ball.h >= H) { ball.y = H - ball.h; ball.dy = -ball.dy; }

    // Paddle 1 collision
    if (ball.dx < 0 &&
        ball.x <= p1.x + p1.w && ball.x + ball.w >= p1.x &&
        ball.y + ball.h >= p1.y && ball.y <= p1.y + p1.h) {
        ball.x = p1.x + p1.w + 1;
        let hit = (ball.y + ball.h / 2 - (p1.y + p1.h / 2)) / (p1.h / 2);
        let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) * 1.05;
        ball.dx = Math.abs(Math.cos(hit * Math.PI / 3) * speed);
        ball.dy = hit * speed * 0.7;
    }

    // Paddle 2 collision
    if (ball.dx > 0 &&
        ball.x + ball.w >= p2.x && ball.x + ball.w <= p2.x + p2.w &&
        ball.y + ball.h >= p2.y && ball.y <= p2.y + p2.h) {
        ball.x = p2.x - ball.w - 1;
        let hit = (ball.y + ball.h / 2 - (p2.y + p2.h / 2)) / (p2.h / 2);
        let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) * 1.05;
        ball.dx = -Math.abs(Math.cos(hit * Math.PI / 3) * speed);
        ball.dy = hit * speed * 0.7;
    }

    // Score
    if (ball.x + ball.w < 0) {
        score2++;
        updateScore();
        if (score2 >= WIN_SCORE) { showOverlay(gameMode === '2p' ? 'Player 2 Wins!' : 'CPU Wins!', `Final: ${score1} - ${score2}`); return; }
        resetBall(1);
    }
    if (ball.x > W) {
        score1++;
        updateScore();
        if (score1 >= WIN_SCORE) { showOverlay('You Win!', `Final: ${score1} - ${score2}`); return; }
        resetBall(-1);
    }
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Center line
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    const dash = 16;
    for (let y = 0; y < H; y += dash * 2) {
        ctx.beginPath();
        ctx.moveTo(W / 2, y);
        ctx.lineTo(W / 2, y + dash);
        ctx.stroke();
    }

    // Paddles
    ctx.fillStyle = '#fff';
    ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
    ctx.fillRect(p2.x, p2.y, p2.w, p2.h);

    // Ball
    ctx.fillRect(ball.x, ball.y, ball.w, ball.h);

    // Score labels
    ctx.fillStyle = '#333';
    ctx.font = '100px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(score1, W / 2 - 80, 90);
    ctx.fillText(score2, W / 2 + 80, 90);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
