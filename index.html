<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quick Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  h1 { font-size: 56px; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 50px; }
  h1 span { color: #f5e042; }
  .games { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
  .game-link {
    width: 260px; padding: 40px 30px; border: 2px solid #333;
    text-decoration: none; color: #fff; border-radius: 8px;
    transition: border-color 0.2s, transform 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .game-link:hover { border-color: #fff; transform: scale(1.05); }
  .game-link .icon { font-size: 48px; }
  .game-link .name { font-size: 24px; font-weight: bold; letter-spacing: 3px; }
  .game-link .desc { font-size: 13px; color: #888; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
  <h1><span>Quick</span> Arcade</h1>
  <div class="games">
    <a href="asteroids.html" class="game-link">
      <span class="icon">🚀</span>
      <span class="name">ASTEROIDS</span>
      <span class="desc">Destroy asteroids, save your ship</span>
    </a>
    <a href="tetris.html" class="game-link">
      <span class="icon">🧱</span>
      <span class="name">TETRIS</span>
      <span class="desc">Clear lines, beat the speed</span>
    </a>
    <a href="robotron.html" class="game-link">
      <span class="icon">🤖</span>
      <span class="name">ROBOTRON</span>
      <span class="desc">Multi-directional shooter</span>
    </a>
  </div>
</body>
</html>
